<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航测试 - 无下划线版</title>
    <style>
        body {
            padding: 100px 40px;
            font-family: system-ui, sans-serif;
            background: #f8f6f3;
        }

        .test-nav {
            display: flex;
            gap: 40px;
            list-style: none;
            padding: 0;
            font-weight: 500;
            font-size: 1.2rem;
        }

        .test-nav a {
            text-decoration: none;
            color: #5a5a5a;
            padding: 4px 0;
            cursor: pointer;
            font-weight: 500;
            transition: color 0.2s, font-weight 0.2s;
        }

        /* 激活状态：颜色加深 + 加粗 */
        .test-nav a.active-link {
            color: #1c1c1c;
            font-weight: 700;
        }

        /* 悬停效果（非激活状态） */
        .test-nav a:hover {
            color: #1c1c1c;
        }

        /* 移除所有下划线 */
        .test-nav a::after {
            display: none !important;
        }

        .info {
            margin-top: 50px;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            font-size: 0.9rem;
            border: 1px solid #e8e4de;
        }
        .info p { margin: 4px 0; }
        .info .active-log { font-weight: bold; color: #1c1c1c; }

        .section-block {
            margin-top: 80px;
            padding: 60px 20px;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e8e4de;
        }
        .section-block h2 { margin: 0 0 12px 0; }
    </style>
</head>
<body>

    <h2>🧪 导航测试（无下划线，纯文字加粗）</h2>
    <p style="color: #666; margin-bottom: 24px;">点击导航项 → 文字变黑加粗，且不会随鼠标移走而恢复。</p>

    <ul class="test-nav" id="testNav">
        <li><a data-target="home" class="active-link">首页</a></li>
        <li><a data-target="work">作品</a></li>
        <li><a data-target="about">关于</a></li>
        <li><a data-target="contact">联系</a></li>
    </ul>

    <div class="info" id="statusLog">
        <p>📌 当前激活：<span class="active-log" id="currentActive">首页</span></p>
        <p>🖱️ 上次操作：<span id="lastAction">页面加载</span></p>
    </div>

    <!-- 模拟内容区域，用于滚动测试 -->
    <div class="section-block" id="work" style="margin-top: 100px;">
        <h2>📁 作品区域</h2>
        <p>滚动到这里时，导航应自动切到「作品」</p>
    </div>

    <div class="section-block" id="about" style="margin-top: 80px;">
        <h2>👤 关于区域</h2>
        <p>滚动到这里时，导航应自动切到「关于」</p>
    </div>

    <div class="section-block" id="contact" style="margin-top: 80px; margin-bottom: 200px;">
        <h2>📬 联系区域</h2>
        <p>滚动到这里时，导航应自动切到「联系」</p>
    </div>

    <script>
        (function() {
            'use strict';

            const links = document.querySelectorAll('.test-nav a');
            const sections = ['home', 'work', 'about', 'contact'];
            const activeLog = document.getElementById('currentActive');
            const actionLog = document.getElementById('lastAction');

            // 切换激活项
            function setActive(targetLink) {
                // 移除所有 active-link
                links.forEach(link => link.classList.remove('active-link'));
                // 目标设为 active-link
                targetLink.classList.add('active-link');
                // 更新日志
                activeLog.textContent = targetLink.textContent;
            }

            // ----- 点击逻辑 -----
            links.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (this.classList.contains('active-link')) {
                        actionLog.textContent = '点击当前激活项（无变化）';
                        return;
                    }
                    setActive(this);
                    actionLog.textContent = '点击切换 → ' + this.textContent;

                    // 平滑滚动到对应区域
                    const targetId = this.getAttribute('data-target');
                    if (targetId !== 'home') {
                        const target = document.getElementById(targetId);
                        if (target) {
                            const offset = 80;
                            const top = target.getBoundingClientRect().top + window.pageYOffset - offset;
                            window.scrollTo({ top: top, behavior: 'smooth' });
                        }
                    } else {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                });
            });

            // ===== 根据滚动位置更新导航高亮 =====
            function updateActiveOnScroll() {
                let current = '';
                const scrollPos = window.scrollY + 120;

                sections.forEach(id => {
                    if (id === 'home') {
                        // home 区域是页面顶部，当滚动到接近顶部时激活
                        if (scrollPos < 300) {
                            current = 'home';
                        }
                        return;
                    }
                    const section = document.getElementById(id);
                    if (section) {
                        const top = section.offsetTop;
                        const height = section.offsetHeight;
                        if (scrollPos >= top && scrollPos < top + height) {
                            current = id;
                        }
                    }
                });

                // 如果没有任何区域匹配，默认选中 "home"
                if (!current) {
                    current = 'home';
                }

                // 更新导航高亮
                let needUpdate = false;
                let targetLink = null;
                links.forEach(link => {
                    if (link.getAttribute('data-target') === current) {
                        targetLink = link;
                    }
                });

                // 检查当前激活的是否已经正确
                let currentActive = null;
                links.forEach(link => {
                    if (link.classList.contains('active-link')) {
                        currentActive = link;
                    }
                });

                if (!currentActive || currentActive.getAttribute('data-target') !== current) {
                    if (targetLink) {
                        links.forEach(l => l.classList.remove('active-link'));
                        targetLink.classList.add('active-link');
                        activeLog.textContent = targetLink.textContent + ' (滚动)';
                    }
                }
            }

            // 监听滚动事件，用 throttle 优化
            let scrollTimeout;
            window.addEventListener('scroll', function() {
                if (scrollTimeout) return;
                scrollTimeout = setTimeout(() => {
                    updateActiveOnScroll();
                    scrollTimeout = null;
                }, 100);
            });

            // 页面加载完成后执行一次
            window.addEventListener('load', function() {
                setTimeout(updateActiveOnScroll, 100);
                actionLog.textContent = '页面加载完成';
            });

        })();
    </script>
</body>
</html>
