<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航测试 - 固定版</title>
    <style>
        /* 重置基础边距 */
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
            background: #f8f6f3;
        }

        /* ===== 1. 导航固定在顶部 ===== */
        .nav-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(248, 246, 243, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid #e8e4de;
            padding: 16px 40px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: #1c1c1c;
        }
        .logo span { color: #c7a17a; }

        .test-nav {
            display: flex;
            gap: 36px;
            list-style: none;
            margin: 0;
            padding: 0;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .test-nav a {
            text-decoration: none;
            color: #5a5a5a;
            padding: 4px 0;
            cursor: pointer;
            font-weight: 500;
            transition: color 0.2s, font-weight 0.2s;
        }

        /* ===== 2. 所有导航项统一激活样式 ===== */
        .test-nav a.active-link {
            color: #1c1c1c;
            font-weight: 700;
        }

        .test-nav a:hover {
            color: #1c1c1c;
        }

        /* 移除所有下划线 */
        .test-nav a::after {
            display: none !important;
        }

        /* 内容区域占位，让滚动效果可见 */
        .content-placeholder {
            margin-top: 120px; /* 避开固定导航 */
            padding: 20px 40px;
        }

        .info {
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            font-size: 0.9rem;
            border: 1px solid #e8e4de;
            margin-bottom: 40px;
        }
        .info .active-log { font-weight: bold; color: #1c1c1c; }

        .section-block {
            padding: 60px 20px;
            margin-bottom: 80px;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e8e4de;
        }
        .section-block h2 { margin: 0 0 12px 0; }
    </style>
</head>
<body>

    <!-- ===== 固定导航 ===== -->
    <div class="nav-wrapper">
        <div class="logo">Studio<span>·</span>Y</div>
        <ul class="test-nav" id="testNav">
            <li><a data-target="home" class="active-link">首页</a></li>
            <li><a data-target="work">作品</a></li>
            <li><a data-target="about">关于</a></li>
            <li><a data-target="contact">联系</a></li>
        </ul>
    </div>

    <!-- ===== 页面内容 ===== -->
    <div class="content-placeholder">
        <h2>🧪 导航测试（固定 + 统一高亮）</h2>
        <p style="color: #666; margin-bottom: 24px;">点击导航项或滚动页面，所有项外观一致（变黑加粗）。</p>

        <div class="info" id="statusLog">
            <p>📌 当前激活：<span class="active-log" id="currentActive">首页</span></p>
            <p>🖱️ 上次操作：<span id="lastAction">页面加载</span></p>
        </div>

        <!-- 模拟内容区域 -->
        <div class="section-block" id="work">
            <h2>📁 作品区域</h2>
            <p>滚动到这里时，导航应自动切到「作品」</p>
            <p style="color: #999; margin-top: 12px;">（继续往下滚动测试「关于」和「联系」区域）</p>
        </div>

        <div class="section-block" id="about">
            <h2>👤 关于区域</h2>
            <p>滚动到这里时，导航应自动切到「关于」</p>
        </div>

        <div class="section-block" id="contact" style="margin-bottom: 200px;">
            <h2>📬 联系区域</h2>
            <p>滚动到这里时，导航应自动切到「联系」</p>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const links = document.querySelectorAll('.test-nav a');
            const sections = ['home', 'work', 'about', 'contact'];
            const activeLog = document.getElementById('currentActive');
            const actionLog = document.getElementById('lastAction');

            // ----- 核心切换函数 -----
            function setActive(targetLink, source) {
                // 移除所有 active-link
                links.forEach(link => link.classList.remove('active-link'));
                // 目标添加 active-link
                targetLink.classList.add('active-link');
                // 更新日志
                activeLog.textContent = targetLink.textContent;
                if (source) {
                    actionLog.textContent = source + ' → ' + targetLink.textContent;
                }
            }

            // ----- 点击逻辑 -----
            links.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (this.classList.contains('active-link')) {
                        actionLog.textContent = '点击当前项（无变化）';
                        return;
                    }

                    // 1. 立即切换高亮
                    setActive(this, '点击');

                    // 2. 关闭滚动检测的干扰（500ms 冷却）
                    window._scrollCooldown = true;
                    setTimeout(() => {
                        window._scrollCooldown = false;
                    }, 500);

                    // 3. 平滑滚动到目标区域
                    const targetId = this.getAttribute('data-target');
                    if (targetId === 'home') {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } else {
                        const target = document.getElementById(targetId);
                        if (target) {
                            const offset = 80;
                            const top = target.getBoundingClientRect().top + window.pageYOffset - offset;
                            window.scrollTo({ top: top, behavior: 'smooth' });
                        }
                    }
                });
            });

            // ----- 滚动检测（更新高亮）-----
            function updateActiveOnScroll() {
                if (window._scrollCooldown) return;

                let current = '';
                const scrollPos = window.scrollY + 120;

                // 检测 home（页面顶部）
                if (scrollPos < 300) {
                    current = 'home';
                } else {
                    for (let id of sections) {
                        if (id === 'home') continue;
                        const section = document.getElementById(id);
                        if (section) {
                            const top = section.offsetTop;
                            const height = section.offsetHeight;
                            if (scrollPos >= top && scrollPos < top + height) {
                                current = id;
                                break;
                            }
                        }
                    }
                }

                if (!current) current = 'home';

                // 如果当前高亮项与检测结果不符，则切换
                let currentActive = document.querySelector('.test-nav a.active-link');
                if (!currentActive || currentActive.getAttribute('data-target') !== current) {
                    let targetLink = document.querySelector(`.test-nav a[data-target="${current}"]`);
                    if (targetLink) {
                        setActive(targetLink, '滚动');
                    }
                }
            }

            // 滚动事件节流
            let scrollTimeout;
            window.addEventListener('scroll', function() {
                if (scrollTimeout) return;
                scrollTimeout = setTimeout(() => {
                    updateActiveOnScroll();
                    scrollTimeout = null;
                }, 80);
            });

            // 页面加载完成后初始化
            window.addEventListener('load', function() {
                setTimeout(updateActiveOnScroll, 150);
                actionLog.textContent = '页面加载完成';
            });

        })();
    </script>
</body>
</html>
