<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>全部作品 · 杨一</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-primary: #f8f6f3;
            --bg-card: #ffffff;
            --text-primary: #1c1c1c;
            --text-secondary: #5a5a5a;
            --text-muted: #8a8a8a;
            --accent: #c7a17a;
            --accent-dark: #a88462;
            --border-light: #e8e4de;
            --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 12px 40px rgba(0, 0, 0, 0.07);
            --radius: 20px;
            --transition: 0.25s ease;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            font-family: var(--font);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        img {
            display: block;
            max-width: 100%;
            height: auto;
        }
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ===== 导航（logo 左，导航右） ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 12px 0;
            background: rgba(248, 246, 243, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(232, 228, 222, 0.4);
        }
        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-primary);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .logo span {
            color: var(--accent);
        }
        .nav-links {
            display: flex;
            gap: 28px;
            list-style: none;
            font-weight: 500;
            font-size: 0.95rem;
            align-items: center;
            margin: 0;
            padding: 0;
        }
        .nav-links a {
            color: var(--text-secondary);
            font-weight: 500;
            transition: color 0.2s;
            padding: 4px 0;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
        }
        .nav-links a:hover {
            color: var(--text-primary);
            font-weight: 700;
        }
        .nav-links a::after {
            display: none !important;
        }
        .phone-number {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            cursor: default;
        }
        .phone-number a {
            color: inherit;
            text-decoration: none;
            cursor: default;
            pointer-events: none;
        }
        @media (max-width: 768px) {
            .phone-number a {
                cursor: pointer;
                pointer-events: auto;
            }
        }
        .lang-switch {
            background: none;
            border: 1.5px solid var(--border-light);
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font);
            background: transparent;
            white-space: nowrap;
        }
        .lang-switch:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        /* ===== 二级导航条 ===== */
        .sub-navbar {
            position: fixed;
            top: 68px;
            left: 0;
            width: 100%;
            z-index: 999;
            padding: 10px 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light);
        }
        .sub-navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .sub-navbar .back-link {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sub-navbar .back-link:hover {
            color: var(--text-primary);
        }
        .sub-navbar .back-link i {
            font-size: 0.8rem;
        }

        /* ===== 内容 ===== */
        .section {
            padding: 140px 0 60px 0;
        }
        .section-header {
            text-align: center;
            max-width: 640px;
            margin: 0 auto 30px auto;
        }
        .section-header h2 {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 700;
            margin-bottom: 12px;
        }
        .section-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* ===== 分类标签（同首页样式） ===== */
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 32px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        .filter-tabs button {
            background: transparent;
            border: none;
            font-family: var(--font);
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 0 4px 6px 4px;
            position: relative;
        }
        .filter-tabs button .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: transparent;
            transition: background 0.25s;
        }
        .filter-tabs button[data-filter="分类"] .dot {
            background: var(--accent);
        }
        .filter-tabs button:not([data-filter="分类"]):hover .dot,
        .filter-tabs button:not([data-filter="分类"]).active .dot {
            background: var(--accent);
        }
        .filter-tabs button:not([data-filter="分类"]):hover,
        .filter-tabs button:not([data-filter="分类"]).active {
            color: var(--text-primary);
            font-weight: 700;
        }
        .filter-tabs button.active .dot {
            background: var(--accent);
        }

        /* ===== 作品网格 — 一排4个 ===== */
        .work-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 28px;
        }
        .work-item {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            border: 1px solid rgba(232, 228, 222, 0.3);
        }
        .work-item:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-md);
        }
        .work-item a {
            display: block;
        }
        .work-thumb {
            aspect-ratio: 4/3;
            background: #e8e4de;
            overflow: hidden;
            position: relative;
        }
        .work-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }
        .work-item:hover .work-thumb img {
            transform: scale(1.04);
        }
        .work-thumb .work-overlay {
            position: absolute;
            inset: 0;
            background: rgba(28, 28, 28, 0.3);
            opacity: 0;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .work-item:hover .work-overlay {
            opacity: 1;
        }
        .work-info {
            padding: 16px 18px 18px;
        }
        .work-info h3 {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
        }
        .work-info .tag {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--accent);
            background: rgba(199, 161, 122, 0.12);
            padding: 4px 14px;
            border-radius: 40px;
            margin-top: 4px;
        }

        /* ===== 页脚 ===== */
        .footer {
            padding: 40px 0 30px;
            border-top: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .footer-socials {
            display: flex;
            gap: 20px;
        }
        .footer-socials a {
            color: var(--text-muted);
            transition: all 0.3s ease;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        .footer-socials a:hover {
            color: var(--text-primary);
            background: var(--border-light);
            transform: translateY(-2px);
        }

        @media (max-width: 1200px) {
            .work-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 992px) {
            .work-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 768px) {
            .navbar .container {
                flex-wrap: wrap;
                gap: 8px;
            }
            .nav-links {
                gap: 14px;
                font-size: 0.8rem;
                flex-wrap: wrap;
                justify-content: flex-end;
            }
            .phone-number {
                font-size: 0.75rem;
            }
            .filter-tabs {
                gap: 16px;
            }
            .filter-tabs button {
                font-size: 0.85rem;
            }
        }
        @media (max-width: 640px) {
            .work-grid {
                grid-template-columns: 1fr;
            }
            .nav-links {
                display: none;
            }
            .hamburger {
                display: flex;
            }
            .section {
                padding: 180px 0 40px 0;
            }
            .sub-navbar {
                top: 60px;
                padding: 8px 0;
            }
            .sub-navbar .back-link {
                font-size: 0.8rem;
            }
            .footer {
                flex-direction: column;
                text-align: center;
            }
            .filter-tabs {
                gap: 12px;
            }
            .filter-tabs button {
                font-size: 0.75rem;
            }
        }
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            z-index: 1001;
        }
        .hamburger span {
            display: block;
            width: 26px;
            height: 2px;
            background: var(--text-primary);
            transition: var(--transition);
        }
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background: rgba(248, 246, 243, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            padding: 16px 0;
            min-width: 180px;
            border: 1px solid var(--border-light);
            z-index: 999;
        }
        .dropdown-menu.open {
            display: block;
        }
        .dropdown-menu a {
            display: block;
            padding: 12px 28px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.95rem;
        }
        .dropdown-menu a:hover {
            background: var(--border-light);
            color: var(--text-primary);
            font-weight: 700;
        }
    </style>
</head>
<body>

    <!-- ===== 导航 ===== -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="index.html" class="logo">Studio<span>·</span>Y</a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">首页</a></li>
                <li><a href="index.html#work">作品</a></li>
                <li><a href="index.html#about">关于</a></li>
                <li><a href="index.html#contact">联系</a></li>
                <li class="phone-number"><a href="tel:+8613800008888">138 0000 8888</a></li>
                <li><button class="lang-switch" id="langSwitch">EN</button></li>
            </ul>
            <button class="hamburger" id="hamburger" aria-label="菜单">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- ===== 二级导航条 ===== -->
    <div class="sub-navbar" id="subNavbar">
        <div class="container">
            <a href="index.html#work" class="back-link"><i class="fas fa-arrow-left"></i> 返回全部作品</a>
            <a href="javascript:void(0)" class="back-link" id="backToDetailBtn" style="display:none;"><i class="fas fa-undo"></i> 上一步</a>
        </div>
    </div>

    <!-- ===== 全部作品 ===== -->
    <section class="section">
        <div class="container">
            <div class="section-header">
                <h2>全部作品</h2>
                <p>所有设计项目一览</p>
            </div>

            <div class="filter-tabs" id="filterTabs">
                <!-- 由 JS 生成 -->
            </div>

            <div class="work-grid" id="workGrid">
                <!-- 由 JS 生成 -->
            </div>
        </div>
    </section>

    <!-- ===== 页脚 ===== -->
    <footer class="footer container">
        <span>&copy; 2026 杨一 · 工业设计</span>
        <div class="footer-socials">
            <a href="javascript:void(0)" id="wechatBtn" aria-label="微信"><i class="fab fa-weixin"></i></a>
            <a href="https://www.douyin.com/your-id" target="_blank" aria-label="抖音"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.xiaohongshu.com/your-id" target="_blank" aria-label="小红书"><i class="fas fa-pen-fancy"></i></a>
            <a href="https://space.bilibili.com/your-id" target="_blank" aria-label="B站"><i class="fab fa-bilibili"></i></a>
        </div>
    </footer>

    <script>
        (function() {
            // ===== 作品数据（20个） =====
            const projects = [
                { id: 1, title: '流线椅', category: '家具', img: 'https://picsum.photos/600/450?random=2' },
                { id: 2, title: '智能音箱 · 极光', category: '消费电子', img: 'https://picsum.photos/600/450?random=3' },
                { id: 3, title: '模块化灯具 · 棱', category: '家居', img: 'https://picsum.photos/600/450?random=4' },
                { id: 4, title: '未来出行 · 畅想', category: '概念', img: 'https://picsum.photos/600/450?random=5' },
                { id: 5, title: '极简办公桌 · 静', category: '家具', img: 'https://picsum.photos/600/450?random=6' },
                { id: 6, title: '便携投影仪 · 光羽', category: '消费电子', img: 'https://picsum.photos/600/450?random=7' },
                { id: 7, title: '悬浮台灯 · 云影', category: '家居', img: 'https://picsum.photos/600/450?random=13' },
                { id: 8, title: '模块化置物架 · 叠', category: '概念', img: 'https://picsum.photos/600/450?random=14' },
                { id: 9, title: '竹编灯具 · 织', category: '家居', img: 'https://picsum.photos/600/450?random=15' },
                { id: 10, title: '折叠自行车 · 翼', category: '概念', img: 'https://picsum.photos/600/450?random=16' },
                { id: 11, title: '陶瓷茶具 · 山韵', category: '家居', img: 'https://picsum.photos/600/450?random=17' },
                { id: 12, title: '智能手环 · 隐', category: '消费电子', img: 'https://picsum.photos/600/450?random=18' },
                { id: 13, title: '模块化插座 · 集', category: '家具', img: 'https://picsum.photos/600/450?random=19' },
                { id: 14, title: '便携水壶 · 流', category: '概念', img: 'https://picsum.photos/600/450?random=26' },
                { id: 15, title: '木质时钟 · 晷', category: '家居', img: 'https://picsum.photos/600/450?random=27' },
                { id: 16, title: '无线充电器 · 浮', category: '消费电子', img: 'https://picsum.photos/600/450?random=28' },
                { id: 17, title: '收纳系统 · 方', category: '家具', img: 'https://picsum.photos/600/450?random=29' },
                { id: 18, title: '空气净化器 · 净', category: '消费电子', img: 'https://picsum.photos/600/450?random=30' },
                { id: 19, title: '餐桌 · 合', category: '家具', img: 'https://picsum.photos/600/450?random=31' },
                { id: 20, title: '灯具 · 光晕', category: '家居', img: 'https://picsum.photos/600/450?random=32' }
            ];

            const categories = ['分类', '家具', '消费电子', '家居', '概念'];
            let currentFilter = '分类';

            // ===== 渲染分类 =====
            function renderFilters() {
                const container = document.getElementById('filterTabs');
                container.innerHTML = '';
                const labels = ['分类', '家具', '消费电子', '家居', '概念'];
                const keys = ['分类', '家具', '消费电子', '家居', '概念'];

                keys.forEach((key, idx) => {
                    const btn = document.createElement('button');
                    btn.setAttribute('data-filter', key);
                    if (key === currentFilter) btn.classList.add('active');
                    btn.innerHTML = `${labels[idx]} <span class="dot"></span>`;
                    btn.addEventListener('click', function() {
                        currentFilter = key;
                        renderFilters();
                        renderProjects();
                    });
                    container.appendChild(btn);
                });
            }

            // ===== 渲染作品 =====
            function renderProjects() {
                const grid = document.getElementById('workGrid');
                grid.innerHTML = '';
                let filtered = projects;
                if (currentFilter !== '分类') {
                    filtered = projects.filter(p => p.category === currentFilter);
                }
                if (filtered.length === 0) {
                    grid.innerHTML =
                        '<p style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:40px 0;">暂无作品</p>';
                    return;
                }
                filtered.forEach(p => {
                    const item = document.createElement('div');
                    item.className = 'work-item';
                    item.innerHTML = `
                        <a href="detail.html?id=${p.id}" class="work-link" data-id="${p.id}">
                            <div class="work-thumb">
                                <img src="${p.img}" alt="${p.title}" loading="lazy" />
                                <div class="work-overlay">查看详情</div>
                            </div>
                            <div class="work-info">
                                <h3>${p.title}</h3>
                                <span class="tag">${p.category}</span>
                            </div>
                        </a>
                    `;
                    grid.appendChild(item);
                });
            }

            // ===== 上一步功能 =====
            const backToDetailBtn = document.getElementById('backToDetailBtn');
            const lastDetailId = localStorage.getItem('lastDetailId');

            if (lastDetailId) {
                backToDetailBtn.style.display = 'flex';
                backToDetailBtn.href = 'detail.html?id=' + lastDetailId;
                backToDetailBtn.innerHTML = '<i class="fas fa-undo"></i> 上一步';
            } else {
                backToDetailBtn.style.display = 'none';
            }

            document.addEventListener('click', function(e) {
                const link = e.target.closest('.work-link');
                if (link) {
                    const id = link.getAttribute('data-id');
                    if (id) {
                        localStorage.setItem('lastDetailId', id);
                    }
                }
            });

            renderFilters();
            renderProjects();
        })();
    </script>
</body>
</html>
