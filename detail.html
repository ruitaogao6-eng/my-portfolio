<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>作品详情 · 高瑞涛</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-primary: #f8f6f3;
            --bg-card: #ffffff;
            --text-primary: #1c1c1c;
            --text-secondary: #5a5a5a;
            --text-muted: #8a8a8a;
            --accent: #c7a17a;
            --accent-dark: #a88462;
            --border-light: #e8e4de;
            --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 12px 40px rgba(0, 0, 0, 0.07);
            --radius: 20px;
            --transition: 0.25s ease;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        html,
        body {
            height: 100%;
        }
        body {
            font-family: var(--font);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            display: flex;
            flex-direction: column;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ===== 导航 ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 12px 0;
            background: rgba(248, 246, 243, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(232, 228, 222, 0.4);
        }
        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-primary);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .logo span {
            color: var(--accent);
        }
        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
            font-weight: 500;
            font-size: 0.95rem;
            align-items: center;
            margin: 0;
            padding: 0;
        }
        .nav-links a {
            color: var(--text-secondary);
            font-weight: 500;
            transition: color 0.2s;
            padding: 4px 0;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
        }
        .nav-links a:hover {
            color: var(--text-primary);
            font-weight: 700;
        }
        .nav-links a::after {
            display: none !important;
        }

        /* ===== 手机端下拉菜单 ===== */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
            z-index: 1001;
        }
        .hamburger span {
            display: block;
            width: 26px;
            height: 2.5px;
            background: var(--text-primary);
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 60px;
            right: 0;
            background: rgba(248, 246, 243, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            padding: 16px 0;
            min-width: 160px;
            border: 1px solid var(--border-light);
            z-index: 999;
        }
        .dropdown-menu.open {
            display: block;
        }
        .dropdown-menu a {
            display: block;
            padding: 10px 24px;
            color: var(--text-secondary);
            font-weight: 500;
            text-decoration: none;
            font-size: 0.95rem;
        }
        .dropdown-menu a:hover {
            background: var(--border-light);
            color: var(--text-primary);
        }

        /* ===== 回到顶部按钮（恢复原来位置） ===== */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            font-size: 1.4rem;
            box-shadow: var(--shadow-md);
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }
        .back-to-top:hover {
            background: var(--accent-dark);
            transform: translateY(-2px);
        }
        .back-to-top.visible {
            display: flex;
        }

        .phone-number {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            cursor: default;
        }
        .phone-number a {
            color: inherit;
            text-decoration: none;
            cursor: default;
            pointer-events: none;
        }
        @media (max-width: 768px) {
            .phone-number a {
                cursor: pointer;
                pointer-events: auto;
            }
        }
        .lang-switch {
            background: none;
            border: 1.5px solid var(--border-light);
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font);
            background: transparent;
            white-space: nowrap;
        }
        .lang-switch:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        .sub-navbar {
            position: fixed;
            top: 68px;
            left: 0;
            width: 100%;
            z-index: 999;
            padding: 10px 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light);
        }
        .sub-navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .sub-navbar .back-link {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sub-navbar .back-link:hover {
            color: var(--text-primary);
        }
        .sub-navbar .back-link i {
            font-size: 0.8rem;
        }

        .main-content {
            flex: 1;
            padding-top: 130px;
        }

        .detail-hero {
            padding: 50px 0 70px 0;
        }
        .detail-hero .hero-inner {
            position: relative;
            background: #ffffff;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: stretch;
            min-height: 380px;
        }
        .detail-hero .hero-image {
            flex: 0 0 55%;
            min-height: 380px;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            order: 2;
        }
        .detail-hero .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            aspect-ratio: 16/9;
        }
        .detail-hero .hero-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px 60px;
            background: #ffffff;
            order: 1;
        }
        .detail-hero .hero-text h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 14px;
            color: var(--text-primary);
        }
        .detail-hero .hero-text .meta {
            display: flex;
            gap: 28px;
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .detail-hero .hero-text .meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .detail-hero .hero-text .desc {
            font-size: 1.15rem;
            color: var(--text-secondary);
            max-width: 640px;
            line-height: 1.9;
        }

        .detail-content {
            padding: 20px 0 70px 0;
        }
        .detail-content .section-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 32px;
            color: var(--text-primary);
            text-align: left;
        }
        .detail-gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
        }
        .detail-gallery img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            cursor: pointer;
        }
        .detail-gallery img:hover {
            transform: scale(1.03);
            box-shadow: var(--shadow-md);
        }

        /* ===== 图片预览弹窗 ===== */
        .image-preview-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            overflow: hidden;
        }
        .image-preview-overlay.open {
            display: flex;
            opacity: 1;
        }
        .image-preview-overlay .preview-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .image-preview-overlay .preview-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            touch-action: none;
            cursor: grab;
            transition: none;
            user-select: none;
            -webkit-user-select: none;
        }
        .image-preview-overlay .preview-wrapper img:active {
            cursor: grabbing;
        }
        .image-preview-overlay .close-btn {
            position: absolute;
            top: 20px;
            right: 24px;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            z-index: 10;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .image-preview-overlay .close-btn:hover {
            opacity: 1;
        }

        .footer {
            width: 100%;
            padding: 40px 0 30px;
            border-top: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: auto;
            background: var(--bg-primary);
        }
        .footer .copyright {
            text-align: left;
        }
        .footer-socials {
            display: flex;
            gap: 20px;
        }
        .footer-socials a {
            color: var(--text-muted);
            transition: all 0.3s ease;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        .footer-socials a:hover {
            color: var(--text-primary);
            background: var(--border-light);
            transform: translateY(-2px);
        }

        @media (max-width: 1024px) {
            .detail-hero .hero-text {
                padding: 35px 40px;
            }
            .detail-hero .hero-text h1 {
                font-size: 2.2rem;
            }
            .detail-hero .hero-text .desc {
                font-size: 1.05rem;
            }
        }
        @media (max-width: 900px) {
            .container {
                padding: 0 24px;
            }
            .sub-navbar .container {
                padding: 0 24px;
            }
            .navbar .container {
                padding: 0 24px;
            }
            .detail-hero .hero-inner {
                flex-direction: column;
                min-height: auto;
            }
            .detail-hero .hero-image {
                flex: 1;
                min-height: 220px;
                order: 1;
            }
            .detail-hero .hero-text {
                order: 2;
                padding: 30px;
            }
            .detail-hero .hero-text .desc {
                max-width: 100%;
            }
        }
        @media (max-width: 768px) {
            .navbar .container {
                gap: 16px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .nav-links {
                gap: 16px;
                font-size: 0.85rem;
            }
            .phone-number {
                font-size: 0.8rem;
            }
            .detail-gallery {
                grid-template-columns: 1fr 1fr;
                gap: 16px;
            }
            .detail-hero .hero-text h1 {
                font-size: 1.8rem;
            }
            .detail-hero .hero-text .desc {
                font-size: 1rem;
            }
            .image-preview-overlay .close-btn {
                font-size: 1.8rem;
                top: 16px;
                right: 20px;
            }
            .back-to-top {
                bottom: 100px;
                right: 20px;
                width: 44px;
                height: 44px;
                font-size: 1.2rem;
            }
        }
        @media (max-width: 640px) {
            .nav-links {
                display: none;
            }
            .hamburger {
                display: flex;
            }
            .detail-gallery {
                grid-template-columns: 1fr;
            }
            .detail-hero {
                padding: 20px 0 30px 0;
            }
            .sub-navbar {
                top: 60px;
                padding: 8px 0;
            }
            .sub-navbar .back-link {
                font-size: 0.8rem;
            }
            .footer {
                flex-direction: column;
                text-align: center;
            }
            .footer-socials {
                justify-content: center;
            }
            .main-content {
                padding-top: 110px;
            }
            .detail-hero .hero-text {
                padding: 20px;
            }
            .image-preview-overlay .close-btn {
                font-size: 1.6rem;
                top: 14px;
                right: 16px;
            }
            .back-to-top {
                bottom: 90px;
                right: 16px;
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
        }
    </style>
</head>

            var params = new URLSearchParams(window.location.search);
            var currentId = parseInt(params.get('id')) || 1;
            if (!projectData[currentId]) currentId = 1;

            function renderProject(id) {
                var data = projectData[id];
                if (!data) return;

                document.getElementById('detailTitle').textContent = data.title;
                document.getElementById('detailCategory').textContent = data.category;
                document.getElementById('detailDesc').textContent = data.desc;
                document.getElementById('detailMainImg').src = data.mainImg;

                var gallery = document.getElementById('detailGallery');
                gallery.innerHTML = '';
                data.detailImgs.forEach(function(src) {
                    var img = document.createElement('img');
                    img.src = src;
                    img.alt = data.title + ' 细节';
                    img.loading = 'lazy';
                    img.dataset.src = src;
                    img.addEventListener('click', function(e) {
                        openPreview(this.dataset.src);
                    });
                    gallery.appendChild(img);
                });

                var total = Object.keys(projectData).length;
                var idx = Object.keys(projectData).indexOf(String(id));
                document.getElementById('detailCounter').textContent = (idx + 1) + ' / ' + total;
            }

            // ===== 图片预览功能（含拖拽 + 缩放） =====
            var overlay = document.getElementById('imagePreviewOverlay');
            var previewImg = document.getElementById('imagePreviewImg');
            var closeBtn = document.getElementById('imagePreviewClose');
            var wrapper = document.getElementById('previewWrapper');

            var currentScale = 1;
            var posX = 0,
                posY = 0;
            var isDragging = false;
            var startX = 0,
                startY = 0;
            var dragStartX = 0,
                dragStartY = 0;

            function resetTransform() {
                currentScale = 1;
                posX = 0;
                posY = 0;
                previewImg.style.transform = 'translate(0px, 0px) scale(1)';
            }

            function openPreview(src) {
                previewImg.src = src;
                overlay.classList.add('open');
                document.body.style.overflow = 'hidden';
                resetTransform();
            }

            function closePreview() {
                overlay.classList.remove('open');
                document.body.style.overflow = '';
                resetTransform();
            }

            closeBtn.addEventListener('click', closePreview);
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay || e.target === wrapper) {
                    closePreview();
                }
            });

            // ===== 鼠标滚轮缩放 =====
            previewImg.addEventListener('wheel', function(e) {
                e.preventDefault();
                var delta = e.deltaY > 0 ? -0.1 : 0.1;
                var newScale = Math.min(Math.max(currentScale + delta, 0.5), 3);
                currentScale = newScale;
                previewImg.style.transform = 'translate(' + posX + 'px, ' + posY + 'px) scale(' + currentScale + ')';
            }, { passive: false });

            // ===== 鼠标拖拽移动 =====
            previewImg.addEventListener('mousedown', function(e) {
                if (currentScale <= 1) return;
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                dragStartX = posX;
                dragStartY = posY;
                previewImg.style.cursor = 'grabbing';
                e.preventDefault();
            });

            window.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                var dx = e.clientX - startX;
                var dy = e.clientY - startY;
                posX = dragStartX + dx;
                posY = dragStartY + dy;
                previewImg.style.transform = 'translate(' + posX + 'px, ' + posY + 'px) scale(' + currentScale + ')';
            });

            window.addEventListener('mouseup', function() {
                if (isDragging) {
                    isDragging = false;
                    previewImg.style.cursor = currentScale > 1 ? 'grab' : 'default';
                }
            });

            // ===== 触摸双指缩放 + 单指拖拽 =====
            var initialPinchDist = 0;
            var initialScaleTouch = 1;
            var initialPosXTouch = 0,
                initialPosYTouch = 0;
            var lastTouchX = 0,
                lastTouchY = 0;
            var isTouching = false;

            previewImg.addEventListener('touchstart', function(e) {
                if (e.touches.length === 1) {
                    isTouching = true;
                    lastTouchX = e.touches[0].clientX;
                    lastTouchY = e.touches[0].clientY;
                    initialPosXTouch = posX;
                    initialPosYTouch = posY;
                } else if (e.touches.length === 2) {
                    var dx = e.touches[0].clientX - e.touches[1].clientX;
                    var dy = e.touches[0].clientY - e.touches[1].clientY;
                    initialPinchDist = Math.sqrt(dx * dx + dy * dy);
                    initialScaleTouch = currentScale;
                    initialPosXTouch = posX;
                    initialPosYTouch = posY;
                }
            }, { passive: true });

            previewImg.addEventListener('touchmove', function(e) {
                if (e.touches.length === 1 && isTouching && currentScale > 1) {
                    var dx = e.touches[0].clientX - lastTouchX;
                    var dy = e.touches[0].clientY - lastTouchY;
                    posX = initialPosXTouch + dx;
                    posY = initialPosYTouch + dy;
                    previewImg.style.transform = 'translate(' + posX + 'px, ' + posY + 'px) scale(' + currentScale +
                        ')';
                } else if (e.touches.length === 2) {
                    e.preventDefault();
                    var dx = e.touches[0].clientX - e.touches[1].clientX;
                    var dy = e.touches[0].clientY - e.touches[1].clientY;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    var scaleChange = dist / initialPinchDist;
                    var newScale = Math.min(Math.max(initialScaleTouch * scaleChange, 0.5), 3);
                    currentScale = newScale;
                    previewImg.style.transform = 'translate(' + posX + 'px, ' + posY + 'px) scale(' + currentScale +
                        ')';
                }
            }, { passive: false });

            previewImg.addEventListener('touchend', function() {
                isTouching = false;
            }, { passive: true });

            // 键盘 ESC 关闭
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closePreview();
                }
            });

            // 窗口大小变化时重置预览
            window.addEventListener('resize', function() {
                if (overlay.classList.contains('open')) {
                    resetTransform();
                }
            });

            // ===== 汉堡菜单 =====
            var hamburger = document.getElementById('hamburger');
            var dropdownMenu = document.getElementById('dropdownMenu');

            if (hamburger && dropdownMenu) {
                hamburger.addEventListener('click', function(e) {
                    e.stopPropagation();
                    this.classList.toggle('active');
                    dropdownMenu.classList.toggle('open');
                });

                dropdownMenu.querySelectorAll('a').forEach(function(link) {
                    link.addEventListener('click', function() {
                        dropdownMenu.classList.remove('open');
                        hamburger.classList.remove('active');
                    });
                });

                document.addEventListener('click', function(e) {
                    if (!e.target.closest('.navbar')) {
                        dropdownMenu.classList.remove('open');
                        hamburger.classList.remove('active');
                    }
                });
            }

            // ===== 回到顶部 =====
            var backToTopBtn = document.getElementById('backToTop');
            if (backToTopBtn) {
                window.addEventListener('scroll', function() {
                    if (window.scrollY > 300) {
                        backToTopBtn.classList.add('visible');
                    } else {
                        backToTopBtn.classList.remove('visible');
                    }
                });
                backToTopBtn.addEventListener('click', function() {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            }

            renderProject(currentId);
        })();
