<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>作品详情 · 杨一</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-primary: #f8f6f3;
            --bg-card: #ffffff;
            --text-primary: #1c1c1c;
            --text-secondary: #5a5a5a;
            --text-muted: #8a8a8a;
            --accent: #c7a17a;
            --accent-dark: #a88462;
            --border-light: #e8e4de;
            --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 12px 40px rgba(0, 0, 0, 0.07);
            --radius: 20px;
            --transition: 0.25s ease;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            font-family: var(--font);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        img {
            display: block;
            max-width: 100%;
            height: auto;
        }
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ===== 导航 ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 12px 0;
            background: rgba(248, 246, 243, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(232, 228, 222, 0.4);
        }
        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-primary);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .logo span {
            color: var(--accent);
        }
        .nav-links {
            display: flex;
            gap: 28px;
            list-style: none;
            font-weight: 500;
            font-size: 0.95rem;
            align-items: center;
            margin: 0;
            padding: 0;
        }
        .nav-links a {
            color: var(--text-secondary);
            font-weight: 500;
            transition: color 0.2s;
            padding: 4px 0;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
        }
        .nav-links a:hover {
            color: var(--text-primary);
            font-weight: 700;
        }
        .nav-links a::after {
            display: none !important;
        }
        .phone-number {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            cursor: default;
        }
        .phone-number a {
            color: inherit;
            text-decoration: none;
            cursor: default;
            pointer-events: none;
        }
        @media (max-width: 768px) {
            .phone-number a {
                cursor: pointer;
                pointer-events: auto;
            }
        }
        .lang-switch {
            background: none;
            border: 1.5px solid var(--border-light);
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font);
            background: transparent;
            white-space: nowrap;
        }
        .lang-switch:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        /* ===== 返回全部作品按钮 ===== */
        .sub-navbar {
            position: fixed;
            top: 68px;
            left: 0;
            width: 100%;
            z-index: 999;
            padding: 10px 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light);
        }
        .sub-navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .sub-navbar .back-link {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sub-navbar .back-link:hover {
            color: var(--text-primary);
        }
        .sub-navbar .back-link i {
            font-size: 0.8rem;
        }

        /* ===== 详情内容 ===== */
        .detail-hero {
            padding: 160px 0 40px 0;
        }
        .detail-hero img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
        }
        .detail-content {
            padding: 30px 0 80px 0;
        }
        .detail-content h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
        }
        .detail-content .meta {
            display: flex;
            gap: 24px;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        .detail-content .meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .detail-content .desc {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 720px;
            margin-bottom: 40px;
            line-height: 1.9;
        }

        /* 4张细节图，16:9，放大 */
        .detail-gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin: 40px 0;
        }
        .detail-gallery img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
        }

        /* ===== 页脚 ===== */
        .footer {
            padding: 40px 0 30px;
            border-top: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .footer-socials {
            display: flex;
            gap: 20px;
        }
        .footer-socials a {
            color: var(--text-muted);
            transition: all 0.3s ease;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        .footer-socials a:hover {
            color: var(--text-primary);
            background: var(--border-light);
            transform: translateY(-2px);
        }

        @media (max-width: 1200px) {
            .detail-gallery {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 992px) {
            .detail-gallery {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 768px) {
            .navbar .container {
                flex-wrap: wrap;
                gap: 8px;
            }
            .nav-links {
                gap: 14px;
                font-size: 0.8rem;
                flex-wrap: wrap;
                justify-content: flex-end;
            }
            .phone-number {
                font-size: 0.75rem;
            }
            .detail-gallery {
                grid-template-columns: 1fr 1fr;
            }
        }
        @media (max-width: 640px) {
            .nav-links {
                display: none;
            }
            .hamburger {
                display: flex;
            }
            .detail-content h1 {
                font-size: 2rem;
            }
            .detail-gallery {
                grid-template-columns: 1fr;
            }
            .detail-hero {
                padding: 200px 0 20px 0;
            }
            .sub-navbar {
                top: 60px;
                padding: 8px 0;
            }
            .sub-navbar .back-link {
                font-size: 0.8rem;
            }
            .footer {
                flex-direction: column;
                text-align: center;
            }
        }
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            z-index: 1001;
        }
        .hamburger span {
            display: block;
            width: 26px;
            height: 2px;
            background: var(--text-primary);
            transition: var(--transition);
        }
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background: rgba(248, 246, 243, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            padding: 16px 0;
            min-width: 180px;
            border: 1px solid var(--border-light);
            z-index: 999;
        }
        .dropdown-menu.open {
            display: block;
        }
        .dropdown-menu a {
            display: block;
            padding: 12px 28px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.95rem;
        }
        .dropdown-menu a:hover {
            background: var(--border-light);
            color: var(--text-primary);
            font-weight: 700;
        }
    </style>
</head>
<body>

    <!-- ===== 导航 ===== -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="index.html" class="logo">Studio<span>·</span>Y</a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">首页</a></li>
                <li><a href="index.html#work">作品</a></li>
                <li><a href="index.html#about">关于</a></li>
                <li><a href="index.html#contact">联系</a></li>
                <li class="phone-number"><a href="tel:+8613800008888">138 0000 8888</a></li>
                <li><button class="lang-switch" id="langSwitch">EN</button></li>
            </ul>
            <button class="hamburger" id="hamburger" aria-label="菜单">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- ===== 返回全部作品按钮 ===== -->
    <div class="sub-navbar" id="subNavbar">
        <div class="container">
            <a href="category.html" class="back-link"><i class="fas fa-arrow-left"></i> 返回全部作品</a>
            <span style="font-size:0.8rem;color:var(--text-muted);" id="detailCounter"></span>
        </div>
    </div>

    <!-- ===== 详情内容 ===== -->
    <section class="detail-hero">
        <div class="container">
            <img id="detailMainImg" src="https://picsum.photos/1200/675?random=10" alt="作品主图" loading="lazy" />
        </div>
    </section>

    <section class="detail-content">
        <div class="container">
            <h1 id="detailTitle">流线椅</h1>
            <div class="meta">
                <span><i class="fas fa-tag"></i> <span id="detailCategory">家具</span></span>
                <span><i class="far fa-calendar-alt"></i> 2025</span>
                <span><i class="far fa-clock"></i> 设计周期 · 6 个月</span>
            </div>
            <p class="desc" id="detailDesc">
                流线椅以极简的曲线语言，将人体工学与雕塑感结合。采用可持续胡桃木与再生皮革，每一个曲面都经过反复推敲，既提供舒适的支撑，又成为空间中的视觉焦点。
            </p>

            <div class="detail-gallery" id="detailGallery">
                <!-- 由 JS 动态生成 4 张 16:9 细节图 -->
            </div>
        </div>
    </section>

    <!-- ===== 页脚 ===== -->
    <footer class="footer container">
        <span>&copy; 2026 杨一 · 工业设计</span>
        <div class="footer-socials">
            <a href="javascript:void(0)" id="wechatBtn" aria-label="微信"><i class="fab fa-weixin"></i></a>
            <a href="https://www.douyin.com/your-id" target="_blank" aria-label="抖音"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.xiaohongshu.com/your-id" target="_blank" aria-label="小红书"><i class="fas fa-pen-fancy"></i></a>
            <a href="https://space.bilibili.com/your-id" target="_blank" aria-label="B站"><i class="fab fa-bilibili"></i></a>
        </div>
    </footer>

    <script>
        (function() {
            // ===== 作品数据（含细节图，每个作品4张） =====
            const projectData = {
                1: {
                    title: '流线椅',
                    category: '家具',
                    desc: '流线椅以极简的曲线语言，将人体工学与雕塑感结合。采用可持续胡桃木与再生皮革，每一个曲面都经过反复推敲，既提供舒适的支撑，又成为空间中的视觉焦点。',
                    mainImg: 'https://picsum.photos/1200/675?random=20',
                    detailImgs: [
                        'https://picsum.photos/600/338?random=101',
                        'https://picsum.photos/600/338?random=102',
                        'https://picsum.photos/600/338?random=103',
                        'https://picsum.photos/600/338?random=104'
                    ]
                },
                2: {
                    title: '智能音箱 · 极光',
                    category: '消费电子',
                    desc: '极光智能音箱融合声学科技与极简美学。织物网罩与金属机身的碰撞，配合氛围灯效，让音乐不仅是听觉体验，更是视觉享受。',
                    mainImg: 'https://picsum.photos/1200/675?random=21',
                    detailImgs: [
                        'https://picsum.photos/600/338?random=201',
                        'https://picsum.photos/600/338?random=202',
                        'https://picsum.photos/600/338?random=203',
                        'https://picsum.photos/600/338?random=204'
                    ]
                },
                3: {
                    title: '模块化灯具 · 棱',
                    category: '家居',
                    desc: '棱系列灯具以几何模块化设计，允许用户自由组合光线方向。铝材与磨砂玻璃的结合，营造出温暖而富有层次的光影。',
                    mainImg: 'https://picsum.photos/1200/675?random=22',
                    detailImgs: [
                        'https://picsum.photos/600/338?random=301',
                        'https://picsum.photos/600/338?random=302',
                        'https://picsum.photos/600/338?random=303',
                        'https://picsum.photos/600/338?random=304'
                    ]
                },
                4: {
                    title: '未来出行 · 畅想',
                    category: '概念',
                    desc: '面向2030年的城市通勤概念，以轻量化碳纤维与透明座舱设计，重新定义人、车与城市的关系。',
                    mainImg: 'https://picsum.photos/1200/675?random=23',
                    detailImgs: [
                        'https://picsum.photos/600/338?random=401',
                        'https://picsum.photos/600/338?random=402',
                        'https://picsum.photos/600/338?random=403',
                        'https://picsum.photos/600/338?random=404'
                    ]
                },
                5: {
                    title: '极简办公桌 · 静',
                    category: '家具',
                    desc: '静系列办公桌以悬浮式结构减轻视觉负重，隐藏式线缆管理让桌面始终保持整洁，适合现代居家办公场景。',
                    mainImg: 'https://picsum.photos/1200/675?random=24',
                    detailImgs: [
                        'https://picsum.photos/600/338?random=501',
                        'https://picsum.photos/600/338?random=502',
                        'https://picsum.photos/600/338?random=503',
                        'https://picsum.photos/600/338?random=504'
                    ]
                },
                6: {
                    title: '便携投影仪 · 光羽',
                    category: '消费电子',
                    desc: '光羽投影仪仅重600克，支持4K投屏与自动对焦。金属机身搭配织物手提带，既是科技产品，也是移动的艺术品。',
                    mainImg: 'https://picsum.photos/1200/675?random=25',
                    detailImgs: [
                        'https://picsum.photos/600/338?random=601',
                        'https://picsum.photos/600/338?random=602',
                        'https://picsum.photos/600/338?random=603',
                        'https://picsum.photos/600/338?random=604'
                    ]
                },
                7: {
                    title: '悬浮台灯 · 云影',
                    category: '家居',
                    desc: '悬浮台灯以磁悬浮技术为核心，灯体悬浮于底座之上，营造出轻盈而梦幻的光影效果。',
                    mainImg: 'https://picsum.photos/1200/675?random=33',
                    detailImgs: [
                        'https://picsum.photos/600/338?random=701',
                        'https://picsum.photos/600/338?random=702',
                        'https://picsum.photos/600/338?random=703',
                        'https://picsum.photos/600/338?random=704'
                    ]
                },
                8: {
                    title: '模块化置物架 · 叠',
                    category: '概念',
                    desc: '叠系列置物架采用模块化设计，可根据空间需求自由组合，材质为再生竹与金属，兼顾环保与结构美感。',
                    mainImg: 'https://picsum.photos/1200/675?random=34',
                    detailImgs: [
                        'https://picsum.photos/600/338?random=801',
                        'https://picsum.photos/600/338?random=802',
                        'https://picsum.photos/600/338?random=803',
                        'https://picsum.photos/600/338?random=804'
                    ]
                }
            };

            const params = new URLSearchParams(window.location.search);
            let currentId = parseInt(params.get('id')) || 1;
            if (!projectData[currentId]) currentId = 1;

            function renderProject(id) {
                const data = projectData[id];
                if (!data) return;

                document.getElementById('detailTitle').textContent = data.title;
                document.getElementById('detailCategory').textContent = data.category;
                document.getElementById('detailDesc').textContent = data.desc;
                document.getElementById('detailMainImg').src = data.mainImg;

                // 渲染 4 张 16:9 细节图
                const gallery = document.getElementById('detailGallery');
                gallery.innerHTML = '';
                data.detailImgs.forEach(src => {
                    const img = document.createElement('img');
                    img.src = src;
                    img.alt = data.title + ' 细节';
                    img.loading = 'lazy';
                    gallery.appendChild(img);
                });

                const total = Object.keys(projectData).length;
                const idx = Object.keys(projectData).indexOf(String(id));
                document.getElementById('detailCounter').textContent = (idx + 1) + ' / ' + total;
            }

            renderProject(currentId);
            localStorage.setItem('lastDetailId', currentId);
        })();
    </script>
</body>
</html>
