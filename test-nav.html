<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>分类导航测试</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f6f3;
            padding: 120px 40px 60px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h2 {
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        .sub {
            color: #8a8a8a;
            margin-bottom: 40px;
        }

        /* ===== 分类标签 ===== */
        .filter-tabs {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 40px;
            background: #ffffff;
            padding: 12px 24px;
            border-radius: 60px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            border: 1px solid #e8e4de;
        }

        .filter-tabs button {
            background: transparent;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            color: #5a5a5a;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 40px;
        }

        /* ---- “全部”特殊样式 ---- */
        .filter-tabs button[data-filter="全部"] {
            color: #5a5a5a;
            font-weight: 500;
            background: transparent;
        }
        /* “全部”激活时：深色跑道圆背景 + 文字白色加粗 */
        .filter-tabs button[data-filter="全部"].active {
            background: #2c2c2c;
            color: #ffffff;
            font-weight: 700;
        }

        /* ---- 其他分类（01家具、02消费电子...） ---- */
        .filter-tabs button:not([data-filter="全部"]) .num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
            height: 28px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #5a5a5a;
            transition: all 0.25s ease;
        }
        /* 其他分类激活时：文字加粗变黑，数字变黑（无背景） */
        .filter-tabs button:not([data-filter="全部"]).active {
            color: #1c1c1c;
            font-weight: 700;
        }
        .filter-tabs button:not([data-filter="全部"]).active .num {
            color: #1c1c1c;
            background: transparent;
        }
        /* 其他分类悬停时：文字变深色，数字变深色 */
        .filter-tabs button:not([data-filter="全部"]):hover {
            color: #1c1c1c;
        }
        .filter-tabs button:not([data-filter="全部"]):hover .num {
            color: #1c1c1c;
        }

        /* ---- 分隔符（竖线） ---- */
        .filter-tabs .divider {
            width: 1px;
            height: 24px;
            background: #e8e4de;
            margin: 0 8px;
        }

        /* ===== 状态提示 ===== */
        .status-box {
            margin-top: 40px;
            padding: 20px 24px;
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #e8e4de;
            font-size: 0.95rem;
        }
        .status-box strong {
            color: #1c1c1c;
        }
        .status-box .highlight {
            color: #c7a17a;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">

        <h2>🧪 分类导航样式测试</h2>
        <p class="sub">点击不同分类查看样式变化</p>

        <!-- ===== 分类标签 ===== -->
        <div class="filter-tabs" id="filterTabs">
            <button data-filter="全部" class="active">全部</button>
            <span class="divider"></span>
            <button data-filter="家具"><span class="num">01</span> 家具</button>
            <button data-filter="消费电子"><span class="num">02</span> 消费电子</button>
            <button data-filter="家居"><span class="num">03</span> 家居</button>
            <button data-filter="概念"><span class="num">04</span> 概念</button>
        </div>

        <!-- ===== 状态提示 ===== -->
        <div class="status-box" id="statusBox">
            <p>📌 当前激活：<strong id="currentActive">全部</strong></p>
            <p style="margin-top:6px;color:#8a8a8a;font-size:0.85rem;">
                “全部” → <span style="background:#2c2c2c;color:#fff;padding:2px 10px;border-radius:20px;font-size:0.75rem;">深色跑道圆</span> + 白色文字<br />
                其他分类 → 文字加粗变黑 + 数字变黑（无背景）
            </p>
        </div>

        <p style="margin-top:24px;color:#8a8a8a;font-size:0.85rem;">
            ✅ 确认样式无误后，告诉我“可以合并”，我将把此样式应用到完整网站。
        </p>

    </div>

    <script>
        (function() {
            const buttons = document.querySelectorAll('.filter-tabs button');
            const activeDisplay = document.getElementById('currentActive');

            buttons.forEach(btn => {
                btn.addEventListener('click', function() {
                    buttons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    activeDisplay.textContent = this.getAttribute('data-filter');
                });
            });
        })();
    </script>

</body>
</html>
